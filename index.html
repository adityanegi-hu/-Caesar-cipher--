<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Caesar Cipher Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page">
        <header class="header">
            <h1>Caesar Cipher</h1>
            <p class="subtitle">Encrypt and decrypt text with a simple shift.</p>
        </header>

        <main class="card">
            <form id="cipher-form">
                <div class="field">
                    <label for="text">Text</label>
                    <textarea id="text" name="text" rows="4" placeholder="Type or paste your text here..."></textarea>
                </div>

                <div class="field-group">
                    <div class="field">
                        <label for="shift">Shift (0–25)</label>
                        <input id="shift" name="shift" type="number" min="0" max="25" value="3" />
                    </div>

                    <div class="field">
                        <span class="label">Mode</span>
                        <div class="mode-toggle">
                            <label>
                                <input type="radio" name="mode" value="encrypt" checked />
                                <span>Encrypt</span>
                            </label>
                            <label>
                                <input type="radio" name="mode" value="decrypt" />
                                <span>Decrypt</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" id="run-button">Run</button>
                    <button type="button" id="swap-button" class="secondary">
                        Swap input/output
                    </button>
                </div>
            </form>

            <div class="field">
                <label for="result">Result</label>
                <textarea id="result" rows="4" readonly placeholder="Your result will appear here..."></textarea>
            </div>

            <p id="error" class="error" hidden></p>
        </main>

        <footer class="footer">
            <span>pow by . Aditya negi </span>
            
        </footer>
        <footer class="footer1">
            <span>All right reserved</span> </footer>
    </div>

    <script>
        const form = document.getElementById("cipher-form");
        const textInput = document.getElementById("text");
        const shiftInput = document.getElementById("shift");
        const resultArea = document.getElementById("result");
        const errorEl = document.getElementById("error");
        const runButton = document.getElementById("run-button");
        const swapButton = document.getElementById("swap-button");

        function setLoading(isLoading) {
            runButton.disabled = isLoading;
            runButton.textContent = isLoading ? "Working..." : "Run";
        }

        function getApiUrl() {
            // If page is not served by Flask, call local Flask API directly.
            if (window.location.origin === "http://127.0.0.1:5000" || window.location.origin === "http://localhost:5000") {
                return "/api/cipher";
            }
            return "http://127.0.0.1:5000/api/cipher";
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            errorEl.hidden = true;
            errorEl.textContent = "";

            const text = textInput.value;
            const shift = shiftInput.value;
            const mode = form.mode.value;

            if (!text.trim()) {
                errorEl.textContent = "Please enter some text.";
                errorEl.hidden = false;
                return;
            }

            setLoading(true);
            try {
                const response = await fetch(getApiUrl(), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text, shift, mode }),
                });

                const rawBody = await response.text();
                let data = {};

                // Avoid crashing when backend returns empty or non-JSON body.
                if (rawBody) {
                    try {
                        data = JSON.parse(rawBody);
                    } catch (parseError) {
                        if (!response.ok) {
                            throw new Error("Server returned an invalid response.");
                        }
                        throw new Error("Could not read server response.");
                    }
                }

                if (!response.ok) {
                    const serverMessage =
                        data.error ||
                        (rawBody && !rawBody.trim().startsWith("<") ? rawBody : "") ||
                        response.statusText ||
                        "Request failed.";
                    throw new Error(`Request failed (${response.status}): ${serverMessage}`);
                }

                if (typeof data.result !== "string") {
                    throw new Error("Server response is missing result text.");
                }

                resultArea.value = data.result;
            } catch (err) {
                errorEl.textContent = err.message || "Something went wrong.";
                errorEl.hidden = false;
            } finally {
                setLoading(false);
            }
        });

        swapButton.addEventListener("click", () => {
            const currentResult = resultArea.value;
            const currentText = textInput.value;
            resultArea.value = currentText;
            textInput.value = currentResult;
        });
    </script>
</body>

</html>
